version: 2

builds:
  - main: ./cmd/tq
    binary: tq
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

sboms:
  - artifacts: archive

changelog:
  disable: true
  # Release notes generated by git-cliff in the workflow

release:
  extra_files: []
  prerelease: auto
  footer: |
    **Full Changelog**: https://github.com/tq-lang/tq/blob/main/CHANGELOG.md

brews:
  - repository:
      owner: tq-lang
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: goreleaser-{{ .ProjectName }}-{{ .Version }}
      pull_request:
        enabled: true
        base:
          owner: tq-lang
          name: homebrew-tap
          branch: main
    skip_upload: false
    directory: Formula
    url_template: "https://github.com/tq-lang/tq/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: https://github.com/tq-lang/tq
    description: "Command-line TOON/JSON processor — jq for TOON"
    license: MIT
    test: |
      assert_match version.to_s, shell_output("#{bin}/tq --version")
