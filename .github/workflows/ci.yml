name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./cmd/tq

      - name: Vet
        run: go vet ./...

      - name: Test libraries with coverage and race detector
        run: go test -v -race -coverprofile=lib.out ./internal/...

      - name: Test CLI (race detector, skip memory tests)
        run: go test -v -race -short -count=1 ./cmd/tq

      - name: Test CLI with integration coverage (includes memory tests)
        run: |
          mkdir -p .coverdata
          GOCOVERDIR=$(pwd)/.coverdata go test -v -count=1 ./cmd/tq

      - name: Coverage report
        run: |
          echo "### Library coverage"
          go tool cover -func=lib.out | tail -1
          echo "### CLI integration coverage"
          go tool covdata percent -i=.coverdata

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./cmd/tq

      - name: Test internal packages
        run: go test -v ./internal/...
