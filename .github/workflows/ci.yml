name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./cmd/tq

      - name: Vet
        run: go vet ./...

      - name: Test libraries with coverage
        run: go test -v -race -coverprofile=lib.out ./internal/...

      - name: Test CLI with integration coverage
        run: |
          mkdir -p .coverdata
          GOCOVERDIR=$(pwd)/.coverdata go test -v -race -count=1 ./cmd/tq

      - name: Coverage report
        run: |
          echo "### Library coverage"
          go tool cover -func=lib.out | tail -1
          echo "### CLI integration coverage"
          go tool covdata percent -i=.coverdata

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
