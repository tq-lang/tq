name: Changelog Sync

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: git-cliff

      - name: Regenerate changelog
        run: git-cliff -o CHANGELOG.md

      - name: Commit changelog update when needed
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): sync changelog on main"
          git push
